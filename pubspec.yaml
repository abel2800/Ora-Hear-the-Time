name: ora
description: Ora - Voice clock for accessibility
publish_to: 'none'
version: 1.5.1+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_tts: ^4.0.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  vibration: ^2.0.0
  android_alarm_manager_plus: ^4.0.3
  google_fonts: ^6.2.1
  phosphoricons_flutter: ^1.0.0
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/app_icon.png
    background_color: "#09090B"
    theme_color: "#00BFA5"
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#09090B"
  adaptive_icon_foreground: assets/images/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/app_icon.png
