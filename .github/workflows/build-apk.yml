name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare release APK
        run: cp build/app/outputs/flutter-apk/app-release.apk Ora-v1.5.2.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ora-release-apk
          path: Ora-v1.5.2.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.5.2
          name: Ora v1.5.2
          body: |
            ## Ora v1.5.2 — New update

            ### Install
            1. Download **Ora-v1.5.2.apk**
            2. Open the file on your phone and install
            3. Allow install from unknown sources if asked
            4. Grant notification + battery optimization permissions

            ### What's new
            - Better device compatibility
            - Fresh app package for clean installs
            - Tap to hear the time
            - Auto announcements (15 / 30 / 60 min)
            - Repeat count, quiet hours
            - Amharic + voice selection

            Supports Android 5.0 and newer.          files: Ora-v1.5.2.apk
          make_latest: true
